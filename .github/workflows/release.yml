name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    name: Pre-release validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum

      - name: Run tests
        run: go test -timeout 300s ./...

      - name: Golden file regression
        run: go test -v -run TestGolden -timeout 300s ./internal/engine/

  release:
    name: Build and release
    runs-on: ubuntu-latest
    needs: [validate]
    permissions:
      contents: write
      pull-requests: read
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          GO_VERSION=$(go version | awk '{print $3}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT
          echo "go_version=$GO_VERSION" >> $GITHUB_OUTPUT

      - name: Build for multiple platforms
        run: |
          VERSION=${{ steps.version.outputs.version }} \
          COMMIT=${{ steps.version.outputs.commit }} \
          BUILD_DATE=${{ steps.version.outputs.build_date }} \
          GO_VERSION=${{ steps.version.outputs.go_version }} \
          make release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apispec-${{ steps.version.outputs.version }}.tar.gz
            dist/apispec-linux-amd64
            dist/apispec-linux-arm64
            dist/apispec-darwin-amd64
            dist/apispec-darwin-arm64
            dist/apispec-windows-amd64.exe
            dist/apispec-windows-arm64.exe
            dist/*.sha256
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
