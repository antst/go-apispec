name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum

      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.11.4

      - name: golangci-lint
        run: $(go env GOPATH)/bin/golangci-lint run --timeout=5m

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "Unformatted files:"
            gofmt -s -l .
            exit 1
          fi

  test:
    name: Test (Go ${{ matrix.go-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.24', '1.25', '1.26']
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -v ./...

      - name: Run tests
        run: go test -race -coverprofile=coverage.out -timeout 300s ./...

      - name: Coverage summary
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.26'
        run: go tool cover -func=coverage.out | tail -1

  golden:
    name: Golden file regression
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Golden file tests (short names)
        run: go test -v -run TestGolden_AllFrameworks$ -timeout 300s ./internal/engine/

      - name: Golden file tests (legacy names)
        run: go test -v -run TestGolden_AllFrameworks_Legacy -timeout 300s ./internal/engine/

      - name: Determinism tests
        run: go test -v -run TestBuildResponses_Deterministic -timeout 120s ./internal/spec/

  build:
    name: Build (${{ matrix.go-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [test, golden]
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.24', '1.25', '1.26']
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: go.sum

      - name: Build apispec
        run: go build -v ./cmd/apispec

      - name: Build apidiag
        run: go build -v ./cmd/apidiag
